<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="top-buttons">
    <a href="Homepage.html" class="btn">Home</a>
    <a href="Cart.html" class="btn">Back to Cart</a>
</div>

<h1 style="text-align:center; margin-top:80px;">Checkout</h1>

<div class="checkout-container">
    <form id="checkoutForm">
        <h2 style="background-color: black; color: white;">Shipping Details</h2>
        <label>Name</label>
        <input type="text" id="customerName" required>
        <label>Address</label>
        <input type="text" id="customerAddress" required>
        <label>Amount to Pay ($)</label>
        <input type="number" id="amountPaid" required>
        
        <div class="checkout-buttons">
            <button type="submit" class="btn">Confirm</button>
            <button type="button" class="btn" onclick="cancelCheckout()">Cancel</button>
        </div>
    </form>

    <div class="checkout-summary">
        <h3>Cart Summary</h3>
        <ul id="summaryList">
            <!-- Items added via JS -->
        </ul>
        <p>Total Items: <span id="totalItems">0</span></p>
        <p>Total Cost: $<span id="totalCost">0</span></p>
    </div>
</div>

<script src="script.js"></script>
<script>
    displayCheckoutSummary();

    document.getElementById("checkoutForm").addEventListener("submit", function(e){
        e.preventDefault();
        alert("Order Confirmed! Thank you for your purchase.");
        localStorage.removeItem("cart");
        window.location.href = "Products.html";
    });

    function cancelCheckout(){
        alert("Checkout cancelled.");
        window.location.href = "Cart.html";
    }
</script>

</body>
</html>
